<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>cvstart.org</title>
  <link rel="canonical" href="https://cvstart.org/ru/">
  <meta http-equiv="refresh" content="0; url=https://cvstart.org/ru/">
  <script>
    // cvstart.ru/<path> -> cvstart.org/ru/<path> (страница сохраняется: /help -> /ru/help)
    var p = location.pathname.replace(/^\/+/, '');
    location.replace('https://cvstart.org/ru/' + p + location.search + location.hash);
  </script>
  <meta name="robots" content="noindex">
</head>
<body>
  <p>Перенаправление на <a href="https://cvstart.org/ru/">cvstart.org/ru</a>…</p>
</body>
</html>
